<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Endless</title>

    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <script src="https://unpkg.com/lucide@latest"></script>

    <div class="layout">
        <header class="navbar">
            <div class="navbar-left">
                <button class="menu-button" id="menuButton">
                    <i data-lucide="menu"></i>
                </button>

                <a class="logo" href="/">
                    Endless
                </a>
            </div>

            <div class="navbar-right">
                <i data-lucide="bell" width="24" height="24"></i>
                <img class="user-avatar" />
            </div>
        </header>

        <aside class="sidebar" id="sidebar">
            <nav class="menu">
                <div class="menu-item">
                    <span class="icon">
                        <i data-lucide="home" width="24" height="24"></i>
                    </span> 
                    <span class="text">Home</span>
                </div>

                <div class="menu-item">
                    <span class="icon">
                        <i data-lucide="tv-minimal-play" width="24" height="24"></i>
                    </span>
                    <span class="text">Channels</span>
                </div>

                <div class="menu-item">
                    <span class="icon">
                        <i data-lucide="history" width="24" height="24"></i>
                    </span>
                    <span class="text">History</span>
                </div>

                <div class="menu-item">
                    <span class="icon">
                        <i data-lucide="album" width="24" height="24"></i>
                    </span>
                    <span class="text">Album</span>
                </div>
            </nav>
        </aside>

        <main class="main" id="main">
            <div class="videos-grid" id="grid"></div>
        </main>

    </div>

    <script>
        function SetSidebar() {

            const sidebar = document.getElementById("sidebar");
            const main = document.getElementById("main");
            const menuButton = document.getElementById("menuButton");

            let collapsed = true;

            menuButton.addEventListener("click", () => {

                const mobile = window.innerWidth < 1430;

                // MOBILE
                if (mobile) {

                    sidebar.classList.toggle("mobile-show");
                    return;
                }

                // DESKTOP
                collapsed = !collapsed;

                sidebar.classList.toggle("collapsed");
                main.classList.toggle("expanded");
            });

            let isMobiled = false;

            window.addEventListener("resize", () => {

                if (window.innerWidth >= 1430) {

                    sidebar.classList.remove("mobile-show");

                    if (collapsed && isMobiled) {

                        isMobiled = false;

                        sidebar.classList.add("collapsed");
                        main.classList.add("expanded");
                    }
                }
                else if (collapsed) {

                    isMobiled = true;

                    sidebar.classList.remove("collapsed");
                    main.classList.remove("expanded");
                }
            });
        }

        async function refreshToken() {
            await fetch("/api/auth/token", {
                method: "PUT",
                credentials: "include"
            });
        }

        function formatDuration(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);

            return `${min}:${sec.toString().padStart(2, "0")}`;
        }

        function utcDate(date) 
        {
            const videoDate = new Date(date);
            const now = new Date();

            
            if (now.getUTCFullYear() === videoDate.getUTCFullYear() &&
                now.getUTCMonth() === videoDate.getUTCMonth() &&
                now.getUTCDate() === videoDate.getUTCDate()) {

                return videoDate.toLocaleTimeString();
            }

            return videoDate.toLocaleDateString();
        }

        async function fetchVideos() {

            let res = await fetch("/api/content/recommendation", {
                credentials: "include"
            });

            // 401 => refresh token
            if (res.status === 401) {

                await refreshToken();

                res = await fetch("/api/content/recommendation", {
                    credentials: "include"
                });
            }

            // 404 => fallback to random
            if (res.status === 404 || res.status === 401) {

                res = await fetch("/api/content/random", {
                    credentials: "include"
                });
            }

            const data = await res.json();

            const grid = document.getElementById("grid");

            grid.innerHTML = "";

            //create video menu

            const menu = document.createElement("div");
            let currentButton = null;
            let currentVideo = null;

            menu.className = "video-menu";

            //bookmark-off if the video saved

            let isSaved = false;

            let saveIcon = "save";
            let saveText = "Save";

            if (isSaved) 
            {
                saveIcon = "save-off";
                saveText = "Saved";
            }

            menu.innerHTML = `
            <div class="video-menu-item" data-action="save">
                <i data-lucide="${saveIcon}"></i> 
                <div class="video-menu-item-text">${saveText}</div>
            </div>
            <div class="video-menu-item" data-action="share">
                <i data-lucide="share-2"></i> 
                <div class="video-menu-item-text">Share</div>
            </div>
            <div class="video-menu-item" data-action="album">
                <i data-lucide="album"></i> 
                <div class="video-menu-item-text">Album</div>
            </div>
            <div class="video-menu-item" data-action="album">
                <i data-lucide="download"></i> 
                <div class="video-menu-item-text">Download</div>
            </div>
            <div class="video-menu-item" data-action="not-interest">
                <i data-lucide="ban"></i> 
                <div class="video-menu-item-text">Not interest</div>
            </div>
            <div class="video-menu-item danger" data-action="report">
                <i data-lucide="message-square-warning"></i> 
                <div class="video-menu-item-text">Report</div>
            </div>`;

            menu.addEventListener("click", (e) => {
                e.stopPropagation();
                
                const item = e.target.closest(".video-menu-item");
                
                if (!item)
                    return;

                const action = item.dataset.action;

                switch (action) {
                    case "save":

                        console.log("Save video:", currentVideo.contentId);

                        isSaved = !isSaved;

                        let itemIcon = item.querySelector(".video-menu-item svg");
                        let itemText = item.querySelector(".video-menu-item-text");

                        if (isSaved) 
                        {
                            itemIcon.setAttribute("data-lucide", "save-off");
                            itemText.textContent = "Saved";
                        }
                        else 
                        {
                            itemIcon.setAttribute("data-lucide", "save");
                            itemText.textContent = "Save";
                        }

                        lucide.createIcons();

                        break;
                    case "share":
                        console.log("Share video:", currentVideo.title);

                        break;
                    case "album":
                        console.log("Album:", currentVideo);

                        break;
                    case "download": 
                        console.log("Download", currentVideo.contentId);

                        break;
                    case "not-interest":
                        console.log("Not interest:", currentVideo.contentId)
                        
                        break;
                    case "report":
                        console.log("Report:", currentVideo.contentId);

                        break;
                }
            });

            document.body.appendChild(menu);

            data.forEach(v => {

                const card = document.createElement("div");

                card.className = "video-card";

                const title = v.title.length > 72 ? v.title.substring(0, 72) + "..." : v.title;
                
                card.innerHTML = `
                <div class="thumbnail-wrapper">
                    <img class="photo-preview" src="${v.photo.url}" alt="${title}"/> 

                    <div class="video-duration">${formatDuration(v.durationSeconds)}</div>
                </div>

                <div class="video-info">
                    <img class="channel-avatar"/>

                    <div class="video-meta">
                        <div class="video-top-row">
                            <div class="video-title">
                                ${title}
                            </div>
                        </div>

                        <div class="channel-name">
                            Endless 
                            <button class="tooltip-wrapper">
                                <i class="verified-badge" data-lucide="badge-check"></i>
                                <div class="tooltip">
                                    verification badge
                                </div>
                            </button>
                            <button class="tooltip-wrapper">
                                <i class="star-badge" data-lucide="square-star"></i>
                                <div class="tooltip">
                                    square star badge
                                </div>
                            </button>
                            <button class="tooltip-wrapper">
                                <i class="star-badge" data-lucide="circle-star"></i>
                                <div class="tooltip">
                                    circle star badge
                                </div>
                            </button>
                            <button class="tooltip-wrapper">
                                <i class="award-badge" data-lucide="award"></i>
                                <div class="tooltip">
                                    award badge
                                </div>
                            </button>
                            <button class="tooltip-wrapper">
                                <i class="cpu-badge" data-lucide="cpu"></i>
                                <div class="tooltip">
                                    cpu badge
                                </div>
                            </button>
                            <button class="tooltip-wrapper">
                                <i class="gpu-badge" data-lucide="gpu"></i>
                                <div class="tooltip">
                                    gpu badge
                                </div>
                            </button>
                            <button class="tooltip-wrapper">
                                <i class="smm-badge" data-lucide="megaphone"></i>
                                <div class="tooltip">
                                    smm badge
                                </div>
                            </button>
                            <button class="tooltip-wrapper">
                                <i class="handshake-badge" data-lucide="handshake"></i>
                                <div class="tooltip">
                                    handshake badge
                                </div>
                            </button>
                            <button class="tooltip-wrapper">
                                <i class="minus-badge" data-lucide="badge-minus"></i>
                                <div class="tooltip">
                                    minus badge
                                </div>
                            </button>
                            <button class="tooltip-wrapper">
                                <i class="x-badge" data-lucide="badge-x"></i>
                                <div class="tooltip">
                                    x badge
                                </div>
                            </button>
                            <button class="tooltip-wrapper">
                                <i class="more-reports-badge" data-lucide="message-circle-warning"></i>
                                <div class="tooltip">
                                    more reports badge
                                </div>
                            </button>
                            <button class="tooltip-wrapper">
                                <i class="bug-badge" data-lucide="bug"></i>
                                <div class="tooltip">
                                    bunned badge
                                </div>
                            </button>        
                        </div>

                        <div class="video-stats">
                            ${v.viewsCount} views • ${utcDate(v.createdDate)}         
                        </div>
                    </div>
                            
                    <button class="video-menu-btn">
                        <i data-lucide="more-vertical"></i>    
                    </button>
                </div>`;

                card.querySelector(".video-menu-btn").addEventListener("click", (e) => {
                    e.stopPropagation();

                    const button = e.currentTarget;

                    if (menu.classList.contains("open") && currentButton === button) {
                        
                        menu.classList.remove("open");

                        currentButton = null;
                        currentVideo = null;

                        return;
                    }

                    currentButton = button;
                    currentVideo = v;

                    const rect = button.getBoundingClientRect();

                    menu.style.visibility = "hidden";
                    menu.classList.add("open");

                    const spaceBelow = window.innerHeight - rect.bottom;

                    let top;

                    if (spaceBelow < menu.offsetHeight + 10) {
                        top = rect.top - menu.offsetHeight - 6;
                    } else {
                        top = rect.bottom + 6;
                    }

                    menu.style.top = `${top}px`;
                    menu.style.left = `${rect.right - 160}px`;

                    menu.style.visibility = "visible";
                });

                document.addEventListener("click", () => {
                    menu.classList.remove("open");
                    currentButton = null;
                    currentVideo = null;
                });

                card.querySelector(".channel-avatar").addEventListener("click", (e) => {
                    e.stopPropagation();

                    console.log("...");
                });
                
                card.querySelector(".channel-name").addEventListener("click", (e) => {
                    e.stopPropagation();

                    console.log("...");
                });

                card.addEventListener("click", () => {
                    location.href = `/watch.html?id=${v.contentId}`;
                })

                const img = card.querySelector(".photo-preview");

                let rgbaColor;

                function applyColor() {

                    rgbaColor = `rgba(${v.photo.r}, ${v.photo.g}, ${v.photo.b}, 0.3)`;

                    card.dataset.color = rgbaColor;
                }

                if (img.complete) {

                    applyColor();
                }
                else {

                    img.onload = applyColor;
                }

                card.addEventListener("mouseenter", () => {

                    card.style.background = rgbaColor;
                    card.style.border = "1px solid rgba(255, 255, 255, 0.2)";
                });

                card.addEventListener("mouseleave", () => {

                    card.style.background = "rgb(10, 10, 10)";
                    card.style.border = "1px solid rgba(255, 255, 255, 0)";
                });

                grid.appendChild(card);
            });
                
            lucide.createIcons();
        }

        window.addEventListener("DOMContentLoaded", () => {
            lucide.createIcons();
            SetSidebar();
            fetchVideos();
        });

    </script>

</body>

</html>
