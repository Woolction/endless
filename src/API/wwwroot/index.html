<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Endless</title>

    <link rel="stylesheet" href="/style.css">
</head>

<body>

    <div class="layout">

        <!-- TOP NAVBAR -->
        <header class="navbar">

            <div class="navbar-left">

                <button class="menu-button" id="menuButton">
                    ☰
                </button>
        
                <a class="logo" href="/">
                    Endless
                </a>
            </div>

        </header>

        <aside class="sidebar" id="sidebar">

            <nav class="menu">

                <div class="menu-item">
                    <span class="icon">-</span>
                    <span class="text">Home</span>
                </div>

                <div class="menu-item">
                    <span class="icon">-</span>
                    <span class="text">History</span>
                </div>

                <div class="menu-item">
                    <span class="icon">-</span>
                    <span class="text">Channels</span>
                </div>

                <div class="menu-item">
                    <span class="icon">-</span>
                    <span class="text">Trending</span>
                </div>

            </nav>

        </aside>

        <main class="main" id="main">

            <div class="videos-grid" id="grid"></div>

        </main>

    </div>

    <script>
        function SetSidebar() {

            const sidebar = document.getElementById("sidebar");
            const main = document.getElementById("main");
            const menuButton = document.getElementById("menuButton");

            let collapsed = true;

            menuButton.addEventListener("click", () => {

                const mobile = window.innerWidth < 1430;

                // MOBILE
                if (mobile) {

                    sidebar.classList.toggle("mobile-show");
                    return;
                }

                // DESKTOP
                collapsed = !collapsed;

                sidebar.classList.toggle("collapsed");
                main.classList.toggle("expanded");
            });

            let isMobiled = false;

            window.addEventListener("resize", () => {

                if (window.innerWidth >= 1430) {

                    sidebar.classList.remove("mobile-show");

                    if (collapsed && isMobiled) {

                        isMobiled = false;

                        sidebar.classList.add("collapsed");
                        main.classList.add("expanded");
                    }
                }
                else if (collapsed) {

                    isMobiled = true;

                    sidebar.classList.remove("collapsed");
                    main.classList.remove("expanded");
                }
            });
        }

        async function refreshToken() {
            await fetch("/api/auth/token", {
                method: "PUT",
                credentials: "include"
            });
        }

        async function fetchVideos() {

            let res = await fetch("/api/content/recommendation", {
                credentials: "include"
            });

            // 401 => refresh token
            if (res.status === 401) {

                await refreshToken();

                res = await fetch("/api/content/recommendation", {
                    credentials: "include"
                });
            }

            // 404 => fallback to random
            if (res.status === 404 || res.status === 401) {

                res = await fetch("/api/content/random", {
                    credentials: "include"
                });
            }

            const data = await res.json();

            const grid = document.getElementById("grid");

            grid.innerHTML = "";

            //create video menu

            const menu = document.createElement("div");
            let currentButton = null;
            let currentVideo = null;

            menu.className = "video-menu";

            menu.innerHTML = `
            <div class="video-menu-item" data-action="save">Save</div>
            <div class="video-menu-item" data-action="share">Share</div>
            <div class="video-menu-item" data-action="playlist">Playlist</div>
            <div class="video-menu-item danger" data-action="report">Report</div>`;

            menu.addEventListener("click", (e) => {
                e.stopPropagation();
                
                const item = e.target.closest(".video-menu-item");
                
                if (!item)
                    return;

                const action = item.dataset.action;

                switch (action) {
                    case "save":
                        console.log("Save video:", currentVideo.contentId);

                        break;
                    case "share":
                        console.log("Share video:", currentVideo.title);

                        break;
                    case "playlist":
                        console.log("Playlist:", currentVideo);

                        break;
                    case "report":
                        console.log("Report:", currentVideo.contentId);

                        break;
                }
            });

            document.body.appendChild(menu);

            data.forEach(v => {

                const card = document.createElement("div");

                card.className = "video-card";

                const title = v.title.length > 72 ? v.title.substring(0, 72) + "..." : v.title;
                
                card.innerHTML = `
                <img class="photo-preview" src="${v.photo.url}" alt="${title}"/>

                <div class="video-info">
                    <img class="channel-avatar"/>

                    <div class="video-meta">
                        <div class="video-top-row">
                            <div class="video-title">
                                ${title}
                            </div>
                        </div>

                        <div class="channel-name">
                            Endless
                        </div>

                        <div class="video-stats">
                            ${v.viewsCount} views • ${v.createdDate}         
                        </div>
                    </div>
                            
                    <button class="video-menu-btn">⋮</button>

                </div>`;

                card.querySelector(".video-menu-btn").addEventListener("click", (e) => {
                    e.stopPropagation();

                    const button = e.currentTarget;

                    if (menu.classList.contains("open") && currentButton === button) {
                        
                        menu.classList.remove("open");
                        currentButton = null;
                        currentVideo = null;

                        return;
                    }

                    currentButton = button;
                    currentVideo = v;

                    const rect = button.getBoundingClientRect();

                    menu.style.visibility = "hidden";
                    menu.classList.add("open");

                    const spaceBelow = window.innerHeight - rect.bottom;

                    let top;

                    if (spaceBelow < menu.offsetHeight + 10) {
                        top = rect.top - menu.offsetHeight - 6;
                    } else {
                        top = rect.bottom + 6;
                    }

                    menu.style.top = `${top}px`;
                    menu.style.left = `${rect.right - 160}px`;

                    menu.style.visibility = "visible";
                });

                document.addEventListener("click", () => {
                    menu.classList.remove("open");
                    currentButton = null;
                    currentVideo = null;
                });

                card.querySelector(".channel-avatar").addEventListener("click", (e) => {
                    e.stopPropagation();

                    console.log("...");
                });
                
                card.querySelector(".channel-name").addEventListener("click", (e) => {
                    e.stopPropagation();

                    console.log("...");
                });

                card.addEventListener("click", () => {
                    location.href = `/watch.html?id=${v.contentId}`;
                })

                const img = card.querySelector(".photo-preview");

                let rgbaColor;

                function applyColor() {

                    rgbaColor = `rgba(${v.photo.r}, ${v.photo.g}, ${v.photo.b}, 0.3)`;

                    card.dataset.color = rgbaColor;
                }

                if (img.complete) {

                    applyColor();
                }
                else {

                    img.onload = applyColor;
                }

                card.addEventListener("mouseenter", () => {

                    card.style.background = rgbaColor;
                });

                card.addEventListener("mouseleave", () => {

                    card.style.background = "#0f0f0f";
                });

                grid.appendChild(card);
            });
        }

        window.addEventListener("DOMContentLoaded", () => {
            SetSidebar();
            fetchVideos();
        });

    </script>

</body>

</html>
