<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="/css/styles.css">
</head>

<body>

    <div class="header">Upload Video</div>

    <div class="container">
        <input id="userId" placeholder="UserId">
        <input id="channelId" placeholder="ChannelId">
        <input id="title" placeholder="Title">
        <textarea id="desc" placeholder="Description"></textarea>

        <input type="file" id="video">
        <input type="file" id="photo">

        <button onclick="upload()">Upload</button>

        <pre id="res"></pre>
    </div>

    <script>
        async function upload() {
            const fd = new FormData();

            const channelId = document.getElementById("channelId").value;

            fd.append("UserId", document.getElementById("userId").value);
            fd.append("ChannelId", channelId);
            fd.append("Title", document.getElementById("title").value);
            fd.append("Description", document.getElementById("desc").value);
            fd.append("ContentType", 0);

            fd.append("ContentFile", document.getElementById("video").files[0]);
            fd.append("PrewievPhoto", document.getElementById("photo").files[0]);

            const res = await fetch(`/api/content/channel/${channelId}`, {
                method: "POST",
                body: fd
            });

            document.getElementById("res").textContent = await res.text();
        }
    </script>

</body>

</html>
