services:
  api:
    image: endless-api:latest
    build: 
      context: .
      dockerfile: Backend/API/Dockerfile
    depends_on:
      db:
        condition: service_healthy
      search: 
        condition: service_started
    volumes:
      - ./storage:/storage
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      
      ConnectionStrings__DB: Host=db;Port=5432;Database=${DB_NAME};Username=${DB_USER};Password=${DB_PASSWORD}
      
      JwtSettings__SecretKey: ${SecretKey}
      JwtSettings__Issuer: ${Issuer}
      JwtSettings__Audience: ${Audience}
      JwtSettings__ExpireMinutes: ${ExpireMinutes}
    ports:
      - 5000:8080

  db:
    image: postgres:18.3
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - 5433:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres-data:/var/lib/postgresql

  search:
    image: elasticsearch:9.3.3
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms1g -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
  kibana:
    image: kibana:9.3.3
    ports:
        - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://search:9200
    depends_on:
      - search
  
volumes:
  postgres-data:
  elasticsearch_data: